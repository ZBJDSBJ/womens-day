<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三八专属赞美生成器 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --cream:#fdf8f2; --warm:#fff9f5; --blush:#f2c4ce;
  --rose:#d4758a; --deep:#a84f65;
  --purple:#9b7ec8; --deep-purple:#7055a0;
  --text:#3a2a2e; --soft:#7a5a62; --muted:#b89aa0;
  --border:#e8d5d8; --card:rgba(255,252,249,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--cream);color:var(--text);
  font-family:"Noto Serif SC",serif;
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 15% 10%,rgba(242,196,206,.22) 0%,transparent 60%),
    radial-gradient(ellipse 60% 60% at 85% 90%,rgba(212,117,138,.10) 0%,transparent 60%);
}
canvas#petals{position:fixed;inset:0;pointer-events:none;z-index:0;}
.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  padding:48px 20px 64px;
}
header{text-align:center;margin-bottom:28px;animation:up .8s ease both;}
.badge{
  display:inline-block;background:var(--rose);color:#fff;
  font-size:.6rem;letter-spacing:.25em;padding:5px 16px;border-radius:20px;
  margin-bottom:14px;font-family:"Lora",serif;
}
.title{font-size:clamp(1.9rem,6vw,2.9rem);font-weight:700;line-height:1.2;letter-spacing:-.01em;}
.title em{font-style:italic;color:var(--rose);}
body.self .title em{color:var(--purple);}
.sub{margin-top:8px;font-size:.85rem;color:var(--soft);font-weight:300;}
.mode-toggle{
  display:flex;background:#fff;border:1.5px solid var(--border);
  border-radius:30px;padding:4px;margin-bottom:28px;
  animation:up .8s .05s ease both;
}
.mode-btn{
  padding:8px 22px;border-radius:24px;border:none;
  background:transparent;font-family:"Noto Serif SC",serif;
  font-size:.8rem;color:var(--soft);cursor:pointer;transition:all .3s;
}
.mode-btn.on{background:var(--rose);color:#fff;box-shadow:0 2px 12px rgba(212,117,138,.3);}
body.self .mode-btn.on{background:var(--purple);box-shadow:0 2px 12px rgba(155,126,200,.35);}
.card{
  width:100%;max-width:560px;background:var(--card);
  border:1px solid var(--border);border-radius:16px;padding:32px;
  box-shadow:0 4px 40px rgba(168,79,101,.07);
  animation:up .8s .1s ease both;margin-bottom:20px;
}
body.self .card{border-color:#d8ccec;}
.label{
  font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.label::after{content:"";flex:1;height:1px;background:var(--border);}
.field{margin-bottom:16px;}
.field>label{display:block;font-size:.77rem;color:var(--soft);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;background:var(--warm);border:1.5px solid var(--border);
  border-radius:10px;padding:11px 14px;color:var(--text);
  font-family:"Noto Serif SC",serif;font-size:.87rem;
  outline:none;transition:border-color .2s,box-shadow .2s;resize:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--rose);box-shadow:0 0 0 3px rgba(212,117,138,.1);
}
body.self .field input:focus,body.self .field select:focus,body.self .field textarea:focus{
  border-color:var(--purple);box-shadow:0 0 0 3px rgba(155,126,200,.12);
}
.field textarea{height:70px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.tag{
  padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);
  font-size:.74rem;color:var(--soft);cursor:pointer;
  transition:all .2s;background:var(--warm);user-select:none;
}
.tag:hover{border-color:var(--rose);color:var(--rose);}
.tag.on{background:var(--rose);border-color:var(--rose);color:#fff;}
body.self .tag:hover{border-color:var(--purple);color:var(--purple);}
body.self .tag.on{background:var(--purple);border-color:var(--purple);}
.slabel{font-size:.72rem;color:var(--soft);margin:18px 0 8px;display:block;}
.other-fields{transition:max-height .4s,opacity .4s;max-height:800px;overflow:hidden;}
body.self .other-fields{max-height:0;opacity:0;pointer-events:none;}
.self-fields{display:none;}
body.self .self-fields{display:block;}
.gen-btn{
  width:100%;margin-top:22px;
  background:linear-gradient(135deg,var(--rose),var(--deep));
  color:#fff;border:none;border-radius:12px;padding:15px;
  font-family:"Noto Serif SC",serif;font-size:.9rem;font-weight:600;
  letter-spacing:.08em;cursor:pointer;
  transition:opacity .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(168,79,101,.28);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
body.self .gen-btn{background:linear-gradient(135deg,var(--purple),var(--deep-purple));}
.gen-btn:hover{opacity:.9;transform:translateY(-1px);}
.gen-btn:active{transform:scale(.99);}
.gen-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.divider{text-align:center;color:var(--blush);font-size:1.1rem;letter-spacing:.5em;margin:4px 0;opacity:.7;}
#result-wrap{width:100%;max-width:560px;display:none;animation:up .6s ease both;}
#result-wrap.show{display:block;}
.result-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:32px;box-shadow:0 4px 40px rgba(168,79,101,.07);
  position:relative;overflow:hidden;margin-bottom:14px;
}
body.self .result-card{border-color:#d8ccec;}
.result-card::before{
  content:"🌸";position:absolute;top:-10px;right:-10px;
  font-size:80px;opacity:.05;transform:rotate(15deg);pointer-events:none;
}
body.self .result-card::before{content:"✨";}
.result-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--rose);}
body.self .dot{background:var(--purple);}
.result-label{font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.result-to{font-size:.82rem;color:var(--muted);margin-left:auto;font-style:italic;font-family:"Lora",serif;}
#result-text{
  font-size:1rem;line-height:2;color:var(--text);
  font-weight:400;min-height:100px;letter-spacing:.02em;
  outline:none;border-radius:8px;white-space:pre-wrap;
  transition:background .2s,padding .2s;cursor:text;
}
#result-text[contenteditable="true"]{
  background:rgba(212,117,138,.04);padding:10px 12px;
  border:1.5px dashed var(--blush);
}
body.self #result-text[contenteditable="true"]{background:rgba(155,126,200,.05);border-color:#c9b8e8;}
#result-text.typing::after{content:"▌";color:var(--rose);animation:blink .7s infinite;}
body.self #result-text.typing::after{color:var(--purple);}
.edit-hint{text-align:right;font-size:.67rem;color:var(--muted);margin-top:6px;opacity:0;transition:opacity .3s;}
.edit-hint.show{opacity:1;}
.result-footer{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);display:flex;gap:10px;}
.act-btn{
  flex:1;padding:11px;border-radius:10px;
  font-family:"Noto Serif SC",serif;font-size:.77rem;
  cursor:pointer;transition:all .2s;letter-spacing:.05em;font-weight:500;
}
.copy-btn{background:var(--rose);color:#fff;border:none;box-shadow:0 2px 12px rgba(212,117,138,.28);}
body.self .copy-btn{background:var(--purple);}
.copy-btn:hover{opacity:.88;}
.card-btn,.regen-btn{background:transparent;color:var(--soft);border:1.5px solid var(--border);}
.card-btn:hover,.regen-btn:hover{border-color:var(--rose);color:var(--rose);}
body.self .card-btn:hover,body.self .regen-btn:hover{border-color:var(--purple);color:var(--purple);}
.regen-btn{flex:.55;}
#share-wrap{display:none;margin-top:16px;animation:up .5s ease both;}
#share-wrap.show{display:block;}
#share-card{
  border-radius:16px;overflow:hidden;position:relative;
  background:linear-gradient(145deg,#fff5f7,#fdf0f3,#f8eaf5);
  padding:44px 32px 32px;border:1px solid #f0d8de;
  font-family:"Noto Serif SC",serif;
}
body.self #share-card{background:linear-gradient(145deg,#f8f4ff,#f2ecff,#ede5ff);border-color:#d8ccec;}
.card-bar{position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#f0a0b5,#d4758a,#c084b4,#d4758a,#f0a0b5);}
body.self .card-bar{background:linear-gradient(90deg,#b89de0,#9b7ec8,#7b9ed4,#9b7ec8,#b89de0);}
.card-deco{position:absolute;top:14px;right:18px;font-size:24px;opacity:.45;letter-spacing:3px;}
.card-date{font-size:.57rem;letter-spacing:.3em;text-transform:uppercase;color:#c0889a;margin-bottom:5px;font-family:"Lora",serif;}
body.self .card-date{color:#9080b8;}
.card-to{font-size:.83rem;color:#a06070;font-style:italic;font-family:"Lora",serif;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(212,117,138,.18);}
body.self .card-to{color:#8060a0;border-bottom-color:rgba(155,126,200,.2);}
.card-body{font-size:.93rem;line-height:2;color:#4a2e34;letter-spacing:.03em;white-space:pre-wrap;}
body.self .card-body{color:#3a2a4e;}
.card-foot{margin-top:22px;padding-top:14px;border-top:1px solid rgba(212,117,138,.18);display:flex;justify-content:space-between;align-items:center;}
body.self .card-foot{border-top-color:rgba(155,126,200,.2);}
.card-sig{font-size:.7rem;color:#c0889a;font-family:"Lora",serif;font-style:italic;}
body.self .card-sig{color:#9080b8;}
.card-heart{font-size:1rem;color:var(--rose);}
body.self .card-heart{color:var(--purple);}
.dl-btn{
  width:100%;margin-top:12px;background:var(--text);color:#fff;
  border:none;border-radius:10px;padding:12px;
  font-family:"Noto Serif SC",serif;font-size:.78rem;letter-spacing:.08em;
  cursor:pointer;transition:opacity .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.dl-btn:hover{opacity:.82;}
.share-hint{text-align:center;margin-top:10px;font-size:.68rem;color:var(--muted);}
footer{margin-top:40px;text-align:center;font-size:.63rem;color:var(--muted);letter-spacing:.1em;animation:up 1s .3s ease both;}
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text);color:#fff;padding:10px 24px;
  border-radius:24px;font-size:.77rem;letter-spacing:.05em;
  opacity:0;transition:all .3s;pointer-events:none;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){
  .card,.result-card{padding:22px 16px;}
  .row2{grid-template-columns:1fr;}
  .result-footer{flex-wrap:wrap;}
  .regen-btn{flex:1 0 100%;}
}
</style>
</head>
<body>
<canvas id="petals"></canvas>
<div class="toast" id="toast"></div>
<div class="page">
  <header>
    <div class="badge">3.8 国际妇女节</div>
    <div class="title" id="title">为她写一段<br><em>专属赞美</em></div>
    <div class="sub" id="sub">用 AI，送出一份真正走心的话语</div>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn on" id="btn-other" onclick="setMode('other')">💌 写给她</button>
    <button class="mode-btn" id="btn-self" onclick="setMode('self')">🌟 写给自己</button>
  </div>

  <div class="card">
    <div class="label" id="form-label">填写她的信息</div>

    <div class="other-fields">
      <div class="row2">
        <div class="field"><label>她的名字</label>
          <input type="text" id="name" placeholder="小雨、妈妈、Lisa…" maxlength="12">
        </div>
        <div class="field"><label>你们的关系</label>
          <select id="relation">
            <option value="挚友">挚友 / 闺蜜</option>
            <option value="伴侣">伴侣 / 女友</option>
            <option value="妈妈">妈妈</option>
            <option value="同事">同事</option>
            <option value="姐姐">姐姐 / 妹妹</option>
            <option value="妻子">妻子</option>
            <option value="老师">老师</option>
          </select>
        </div>
      </div>
      <div class="field"><label>她最打动你的特质（可多选）</label>
        <div class="tags" id="traits">
          <span class="tag" data-v="温柔体贴">温柔体贴</span>
          <span class="tag" data-v="独立坚强">独立坚强</span>
          <span class="tag" data-v="聪明睿智">聪明睿智</span>
          <span class="tag" data-v="幽默风趣">幽默风趣</span>
          <span class="tag" data-v="努力拼搏">努力拼搏</span>
          <span class="tag" data-v="充满创意">充满创意</span>
          <span class="tag" data-v="善良大方">善良大方</span>
          <span class="tag" data-v="美丽动人">美丽动人</span>
        </div>
      </div>
      <div class="field"><label>一件印象深刻的事（选填）</label>
        <textarea id="memory" placeholder="她一个人搬到陌生城市打拼，从没喊过苦…"></textarea>
      </div>
    </div>

    <div class="self-fields">
      <div class="field"><label>你的名字</label>
        <input type="text" id="self-name" placeholder="小慧、我…" maxlength="12">
      </div>
      <div class="field"><label>你今年经历了什么（选填）</label>
        <textarea id="self-story" placeholder="换了新工作、独自带娃、完成了某个目标…"></textarea>
      </div>
      <div class="field"><label>你想对自己说的方向</label>
        <div class="tags" id="self-traits">
          <span class="tag" data-v="肯定自己的努力">肯定努力</span>
          <span class="tag" data-v="接纳不完美的自己">接纳自我</span>
          <span class="tag" data-v="鼓励继续前行">鼓励前行</span>
          <span class="tag on" data-v="庆祝成长与变化">庆祝成长</span>
        </div>
      </div>
    </div>

    <span class="slabel">文字风格</span>
    <div class="tags" id="styles">
      <span class="tag on" data-v="温柔诗意">🌸 温柔诗意</span>
      <span class="tag" data-v="真诚走心">💌 真诚走心</span>
      <span class="tag" data-v="轻松俏皮">✨ 轻松俏皮</span>
      <span class="tag" data-v="大气有力">🔥 大气有力</span>
    </div>

    <button class="gen-btn" id="gen-btn" onclick="generate()">
      <span>✦</span><span id="btn-label">生成专属赞美</span>
    </button>
  </div>

  <div class="divider">· · · 🌸 · · ·</div>

  <div id="result-wrap">
    <div class="result-card">
      <div class="result-head">
        <div class="dot"></div>
        <div class="result-label">专属赞美</div>
        <div class="result-to" id="result-to"></div>
      </div>
      <div id="result-text" contenteditable="false" spellcheck="false"></div>
      <div class="edit-hint" id="edit-hint">✎ 点击文字可直接编辑</div>
      <div class="result-footer">
        <button class="act-btn copy-btn" onclick="copyText()">复制文字</button>
        <button class="act-btn card-btn" onclick="toggleCard()">🎴 <span id="card-lbl">生成卡片</span></button>
        <button class="act-btn regen-btn" onclick="generate()">重新生成</button>
      </div>
    </div>

    <div id="share-wrap">
      <div id="share-card">
        <div class="card-bar"></div>
        <div class="card-deco" id="card-deco">🌸 🌷 🌸</div>
        <div class="card-date">3.8 · 国际妇女节</div>
        <div class="card-to" id="card-to"></div>
        <div class="card-body" id="card-body"></div>
        <div class="card-foot">
          <div class="card-sig" id="card-sig">用心生成 · 真诚相赠</div>
          <div class="card-heart" id="card-heart">♥</div>
        </div>
      </div>
      <button class="dl-btn" onclick="downloadCard()">↓ 保存卡片图片</button>
    </div>
    <div class="share-hint">截图或保存后发给她 🌷</div>
  </div>

  <footer>三八妇女节快乐 · 愿每位女性都被温柔以待</footer>
</div>

<script>
// ── 樱花动画 ──
const cvs = document.getElementById('petals');
const ctx = cvs.getContext('2d');
let petals = [];
function rsz(){ cvs.width=innerWidth; cvs.height=innerHeight; }
rsz(); addEventListener('resize', rsz);
function mkp(){
  return { x:Math.random()*cvs.width, y:-20, s:Math.random()*8+5,
    vy:Math.random()*1.2+.5, vx:(Math.random()-.5)*.8,
    r:Math.random()*Math.PI*2, vr:(Math.random()-.5)*.04,
    a:Math.random()*.5+.2, sw:Math.random()*2,
    ss:Math.random()*.02+.01, so:Math.random()*Math.PI*2 };
}
for(let i=0;i<18;i++){const p=mkp();p.y=Math.random()*cvs.height;petals.push(p);}
let tf=0;
function draw(){
  ctx.clearRect(0,0,cvs.width,cvs.height); tf++;
  const isSelf=document.body.classList.contains('self');
  petals.forEach(p=>{
    p.y+=p.vy; p.x+=p.vx; p.r+=p.vr;
    if(p.y>cvs.height+30) Object.assign(p,mkp());
    ctx.save();
    ctx.translate(p.x+Math.sin(tf*p.ss+p.so)*30*p.sw, p.y);
    ctx.rotate(p.r); ctx.globalAlpha=p.a;
    ctx.beginPath(); ctx.ellipse(0,0,p.s*.5,p.s,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(0,0,0,0,0,p.s);
    g.addColorStop(0,isSelf?'#d4c0f0':'#f7d0d8');
    g.addColorStop(1,isSelf?'#b090d8':'#e8a0b0');
    ctx.fillStyle=g; ctx.fill(); ctx.restore();
  });
  if(Math.random()<.02&&petals.length<30) petals.push(mkp());
  requestAnimationFrame(draw);
}
draw();

// ── 模式切换 ──
let mode = 'other';
function setMode(m) {
  mode = m;
  document.body.classList.toggle('self', m==='self');
  document.getElementById('btn-other').classList.toggle('on', m==='other');
  document.getElementById('btn-self').classList.toggle('on', m==='self');
  if(m==='self'){
    document.getElementById('title').innerHTML='写给<em>自己的</em><br>一段话';
    document.getElementById('sub').textContent='三八节，先好好赞美一下自己';
    document.getElementById('form-label').textContent='关于你自己';
    document.getElementById('btn-label').textContent='生成专属鼓励';
  } else {
    document.getElementById('title').innerHTML='为她写一段<br><em>专属赞美</em>';
    document.getElementById('sub').textContent='用 AI，送出一份真正走心的话语';
    document.getElementById('form-label').textContent='填写她的信息';
    document.getElementById('btn-label').textContent='生成专属赞美';
  }
  document.getElementById('result-wrap').classList.remove('show');
  document.getElementById('share-wrap').classList.remove('show');
}

// ── 标签 ──
document.querySelectorAll('#traits .tag, #self-traits .tag').forEach(t=>{
  t.addEventListener('click', ()=>t.classList.toggle('on'));
});
document.querySelectorAll('#styles .tag').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('#styles .tag').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
  });
});

// ── 生成 ──
async function generate(){
  const btn = document.getElementById('gen-btn');
  const resultEl = document.getElementById('result-text');
  const style = document.querySelector('#styles .tag.on')?.dataset.v || '温柔诗意';

  let prompt, toText;
  if(mode==='self'){
    const name = document.getElementById('self-name').value.trim() || '自己';
    const story = document.getElementById('self-story').value.trim();
    const traits = [...document.querySelectorAll('#self-traits .tag.on')].map(t=>t.dataset.v).join('、') || '庆祝成长与变化';
    toText = '致 · ' + name;
    prompt = `请为三八妇女节写一段女性写给自己的鼓励：
- 主角：${name}
- 方向：${traits}${story ? '\n- 经历：' + story : ''}
- 风格：${style}
- 长度：100字以内，第一人称，真实不矫情
- 不要标题，结尾加"三八妇女节快乐，感谢自己"`;
  } else {
    const name = document.getElementById('name').value.trim() || '她';
    const rel = document.getElementById('relation').value;
    const mem = document.getElementById('memory').value.trim();
    const traits = [...document.querySelectorAll('#traits .tag.on')].map(t=>t.dataset.v).join('、') || '温柔';
    toText = '致 · ' + name;
    prompt = `请为三八妇女节写一段专属赞美：
- 对象：${name}（${rel}）
- 特质：${traits}${mem ? '\n- 细节：' + mem : ''}
- 风格：${style}
- 长度：100字以内，真诚自然，不分段
- 不要标题，结尾加"三八妇女节快乐"`;
  }

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">✿</span> 正在创作中…';
  resultEl.contentEditable = 'false';
  resultEl.textContent = '';
  resultEl.classList.add('typing');
  document.getElementById('edit-hint').classList.remove('show');
  document.getElementById('share-wrap').classList.remove('show');
  document.getElementById('card-lbl').textContent = '生成卡片';
  document.getElementById('result-to').textContent = toText;
  const wrap = document.getElementById('result-wrap');
  wrap.classList.add('show');
  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});

  const tid = setTimeout(()=>{
    if(resultEl.classList.contains('typing')){
      resultEl.classList.remove('typing');
      resultEl.contentEditable = 'true';
      document.getElementById('edit-hint').classList.add('show');
      if(!resultEl.textContent.trim()) resultEl.textContent = '请求超时，请重试 🌸';
      btn.disabled = false;
      btn.innerHTML = '<span>✦</span><span id="btn-label">' + (mode==='self'?'生成专属鼓励':'生成专属赞美') + '</span>';
    }
  }, 25000);

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ prompt })
    });

    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error || '请求失败 ' + resp.status);
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let ni;
      while((ni = buf.indexOf('\n')) !== -1){
        const line = buf.slice(0, ni).trim();
        buf = buf.slice(ni+1);
        if(!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if(!data || data==='[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          if(parsed.text) resultEl.textContent += parsed.text;
        } catch {}
      }
    }
  } catch(e){
    if(!resultEl.textContent.trim())
      resultEl.textContent = '生成失败：' + e.message + '，请重试 🌸';
  } finally {
    clearTimeout(tid);
  }

  resultEl.classList.remove('typing');
  resultEl.contentEditable = 'true';
  document.getElementById('edit-hint').classList.add('show');
  btn.disabled = false;
  btn.innerHTML = '<span>✦</span><span id="btn-label">' + (mode==='self'?'生成专属鼓励':'生成专属赞美') + '</span>';
}

// ── 卡片 ──
function toggleCard(){
  const wrap = document.getElementById('share-wrap');
  const text = document.getElementById('result-text').textContent.trim();
  if(!text) return;
  if(wrap.classList.contains('show')){
    wrap.classList.remove('show');
    document.getElementById('card-lbl').textContent = '生成卡片';
    return;
  }
  document.getElementById('card-to').textContent = document.getElementById('result-to').textContent;
  document.getElementById('card-body').textContent = text;
  if(mode==='self'){
    document.getElementById('card-deco').textContent = '✨ 🌟 ✨';
    document.getElementById('card-sig').textContent = '写给自己 · 爱自己';
    document.getElementById('card-heart').textContent = '★';
  } else {
    document.getElementById('card-deco').textContent = '🌸 🌷 🌸';
    document.getElementById('card-sig').textContent = '用心生成 · 真诚相赠';
    document.getElementById('card-heart').textContent = '♥';
  }
  wrap.classList.add('show');
  document.getElementById('card-lbl').textContent = '收起卡片';
  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});
}

async function downloadCard(){
  const btn = document.querySelector('.dl-btn');
  btn.textContent = '生成中…';
  try {
    const c = await html2canvas(document.getElementById('share-card'),{scale:3,useCORS:true,backgroundColor:null});
    const a = document.createElement('a');
    a.download = '三八节卡片.png';
    a.href = c.toDataURL('image/png');
    a.click();
    showToast('卡片已保存 ✓');
  } catch {
    showToast('请截图保存 📱');
  }
  btn.innerHTML = '↓ 保存卡片图片';
}

function copyText(){
  const t = document.getElementById('result-text').textContent.trim();
  if(!t) return;
  navigator.clipboard.writeText(t).then(()=>showToast('已复制 ✓'));
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}
</script>
